        - MA_short: "短均线折线, 颜色 #FF6B6B (红), 线宽 1.5"
        - MA_long: "长均线折线, 颜色 #4ECDC4 (青), 线宽 1.5"
      x_axis: "trade_date"
      y_axis: "价格 (元)"
      title: "{股票名称} 双均线策略 ({short}日/{long}日)"

    signal_markers:
      buy_markers:
        type: "标记点 (scatter/markPoint)"
