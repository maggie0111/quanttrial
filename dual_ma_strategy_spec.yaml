        symbol: "triangle (向上箭头)"
        color: "#FF0000 (红色)"
        label: "买入"
        position: "below the price line (y_offset = -10)"
      sell_markers:
        type: "标记点 (scatter/markPoint)"
        condition: "signal == -1"
        symbol: "triangle (向下箭头)"
        color: "#00AA00 (绿色)"
        label: "卖出"
        position: "above the price line (y_offset = +10)"

    volume_chart:
      type: "柱状图 (Bar Chart)"
