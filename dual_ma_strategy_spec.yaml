# ============================================================
# Dual Moving Average Crossover Strategy Specification
# 双均线交叉策略规范
# Version: 1.3
# Created: 2026-07-11
# Updated: 2026-07-11 — 交易成本改为手续费万三+滑点万一; 买入持有升级为完整回测对比; SMIC改用前复权数据; 新增时间窗口可选项
# Description: 标准化双均线交叉策略的完整流程，涵盖数据加载、均线计算、
#              信号生成、可视化、回测评卡、参数实验与策略总结
# Author: 郭美杰
# ============================================================

# -------------------- 1. 策略概述 --------------------
strategy:
  name: "Dual Moving Average Crossover (双均线交叉)"
  type: "趋势跟踪 / Trend Following"
  principle: |
    利用短期均线与长期均线的交叉关系判断趋势方向：
    - 金叉 (Golden Cross): 短均线从下方上穿长均线 → 买入信号
    - 死叉 (Death Cross): 短均线从上方下穿长均线 → 卖出信号
  core_logic:
    - "短均线反映近期价格趋势，反应快但噪声多"
    - "长均线反映中长期趋势，滞后但稳定"
    - "两者交叉代表趋势方向可能发生反转"
  applicability: |
    适用于单边趋势行情（牛市或熊市），在震荡市中容易产生频繁的虚假信号
    导致反复止损。需配合成交量、波动率等辅助指标过滤假信号。

