# -------------------- 4. 均线计算 --------------------
moving_average:
  definition: |
    简单移动平均线 (SMA) = 过去 N 个交易日收盘价的算术平均值
    SMA_N(t) = (1/N) * Σ close(t-i+1), i=1..N

  default_params:
    short_period: 5       # 短均线周期
    long_period: 15       # 长均线周期

  alternative_params:     # 参数实验用
    - {short: 5,  long: 10}
    - {short: 5,  long: 15}   # 默认
    - {short: 5,  long: 20}
    - {short: 10, long: 20}
    - {short: 10, long: 30}
    - {short: 20, long: 60}

  calculation:
    method: "pandas Series.rolling(window=N).mean()"
    min_periods: "N (前 N-1 个交易日为 NaN，不产生信号)"
    output_columns:
      - MA_short: "短均线值"
      - MA_long: "长均线值"

  notes:
    - "使用收盘价计算均线"
    - "均线起始 N-1 天为 NaN，信号计算时自动跳过"
    - "如需指数移动平均(EMA)，替换为 close.ewm(span=N).mean()"

# -------------------- 5. 交易信号生成 --------------------
signals:
  signal_logic:
    golden_cross:
      condition: "MA_short(t) > MA_long(t) AND MA_short(t-1) <= MA_long(t-1)"
      action: "BUY (买入)"
      meaning: "短期均线上穿长期均线，趋势转强"
    death_cross:
      condition: "MA_short(t) < MA_long(t) AND MA_short(t-1) >= MA_long(t-1)"
      action: "SELL (卖出)"
      meaning: "短期均线下穿长期均线，趋势转弱"
    hold:
      condition: "无交叉发生"
      action: "HOLD (持有/空仓)"
      meaning: "维持当前仓位"

  implementation:
    method: |
      # 计算前一日均线关系
      prev_short = MA_short.shift(1)
      prev_long = MA_long.shift(1)

      # 金叉条件: 昨日短<=长, 今日短>长
      golden = (prev_short <= prev_long) & (MA_short > MA_long)
      # 死叉条件: 昨日短>=长, 今日短<长
      death = (prev_short >= prev_long) & (MA_short < MA_long)

      signal = 0  # 默认持有
      signal[golden] = 1   # 买入
      signal[death] = -1   # 卖出

  output_columns:
    - signal: "1=买入, -1=卖出, 0=无操作"
    - position: "当前持仓状态: 1=持仓, 0=空仓 (根据信号累积)"

  position_tracking: |
    position[0] = 0  # 初始空仓
    遍历每个交易日:
      if signal[t] == 1:  position[t] = 1  (买入并持有)
      if signal[t] == -1: position[t] = 0  (卖出空仓)
      if signal[t] == 0:  position[t] = position[t-1]  (维持)

  trading_rules:
    - "信号在当日收盘后确认，次日开盘执行 (或当日收盘价执行)"
    - "同一时间最多持有一手 (满仓/空仓二选一)"
    - "不考虑做空，仅在持仓时盈利/亏损"
    - "每次交易全额买入/卖出 (无仓位管理)"

# -------------------- 6. 可视化要求 --------------------
visualization:
