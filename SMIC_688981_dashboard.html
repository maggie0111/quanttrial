// Build ECharts data
const dates = RAW.map(r => r[0]);
const ohlc  = RAW.map(r => [r[1], r[2], r[3], r[4]]);
const vols  = RAW.map(r => r[5]);

// Volume color logic: compare close[i] vs close[i-1]
const volColors = [];
for (let i = 0; i < RAW.length; i++) {
  if (i > 0 && RAW[i][4] >= RAW[i-1][4]) volColors.push('#e74c3c');
  else if (i > 0) volColors.push('#2ecc71');
  else volColors.push('#e74c3c'); // first bar
}

// ---- Stats ----
const firstClose = RAW[0][4], lastClose = RAW[RAW.length-1][4];
const totalChange = lastClose - firstClose;
const totalChangePct = ((totalChange / firstClose) * 100).toFixed(2);
const maxP = Math.max(...RAW.map(r=>r[2])), minP = Math.min(...RAW.map(r=>r[3]));
const avgVol = (RAW.reduce((s,r)=>s+r[5], 0) / RAW.length).toFixed(0);
const cls = totalChange >= 0 ? 'up' : 'dn';
const sign = totalChange >= 0 ? '+' : '';
document.getElementById('statsContainer').innerHTML = `
  <div class="stat-card"><div class="label">最新价</div><div class="value">${lastClose.toFixed(2)}</div></div>
  <div class="stat-card"><div class="label">年内涨跌</div><div class="value ${cls}">${sign}${totalChange.toFixed(2)} (${sign}${totalChangePct}%)</div></div>
  <div class="stat-card"><div class="label">最高</div><div class="value up">${maxP.toFixed(2)}</div></div>
  <div class="stat-card"><div class="label">最低</div><div class="value dn">${minP.toFixed(2)}</div></div>
  <div class="stat-card"><div class="label">日均成交量</div><div class="value">${(avgVol/10000).toFixed(0)}万手</div></div>
`;

// ---- K线图 ----
var klineChart = echarts.init(document.getElementById('klineChart'));
klineChart.setOption({
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'cross' },
    formatter: function(params) {
      var p = params[0];
      if (!p || !p.data) return '';
      var d = p.data;
      var chg = ((d[2] - d[1]) / d[1] * 100).toFixed(2);
      var color = d[2] >= d[1] ? '#e74c3c' : '#2ecc71';
      return '<b>' + p.axisValue + '</b><br/>'
        + '<span style="color:#666">开:</span> ' + d[1].toFixed(2) + '<br/>'
        + '<span style="color:#666">收:</span> <span style="color:' + color + ';font-weight:bold">' + d[2].toFixed(2) + '</span><br/>'
        + '<span style="color:#666">高:</span> ' + d[3].toFixed(2) + '<br/>'
        + '<span style="color:#666">低:</span> ' + d[4].toFixed(2) + '<br/>'
        + '<span style="color:#666">涨跌:</span> <span style="color:' + color + '">' + (d[2]-d[1]>=0?'+':'') + (d[2]-d[1]).toFixed(2) + ' (' + (d[2]-d[1]>=0?'+':'') + chg + '%)</span>';
    }
  },
  grid: { left: 60, right: 50, top: 16, bottom: 40 },
  xAxis: {
    data: dates,
    axisLine: { lineStyle: { color: '#ccc' } },
    axisLabel: { fontSize: 10, color: '#888' },
    splitLine: { show: false }
  },
  yAxis: {
    scale: true,
    axisLabel: { fontSize: 10, color: '#888' },
    splitLine: { lineStyle: { color: '#f0f0f0' } }
  },
  dataZoom: [
    { type: 'inside', start: 0, end: 100 },
    { type: 'slider', start: 0, end: 100, height: 28, bottom: 6 }
  ],
  series: [{
    type: 'candlestick',
    data: ohlc,
    itemStyle: {
      color: '#e74c3c',
      color0: '#2ecc71',
      borderColor: '#e74c3c',
      borderColor0: '#2ecc71'
    },
    markLine: {
      silent: true,
      data: [
        { yAxis: firstClose, lineStyle: { color: '#999', type: 'dashed', width: 1 }, label: { formatter: '起始: ' + firstClose.toFixed(2), fontSize: 10, color: '#999' } },
        { yAxis: lastClose, lineStyle: { color: '#e74c3c', type: 'dashed', width: 1 }, label: { formatter: '最新: ' + lastClose.toFixed(2), fontSize: 10, color: '#e74c3c' } }
      ]
    }
  }]
});

// ---- 成交量图 ----
var volumeChart = echarts.init(document.getElementById('volumeChart'));
volumeChart.setOption({
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'shadow' },
    formatter: function(params) {
      var p = params[0];
      if (!p) return '';
      return '<b>' + p.axisValue + '</b><br/>成交量: ' + (p.data/10000).toFixed(0) + '万手';
    }
  },
  grid: { left: 60, right: 50, top: 10, bottom: 4 },
  xAxis: {
    data: dates,
    axisLine: { lineStyle: { color: '#ccc' } },
    axisLabel: { show: false },
    splitLine: { show: false }
  },
  yAxis: {
    axisLabel: { fontSize: 9, color: '#888', formatter: function(v) { return (v/10000).toFixed(0) + '万'; } },
    splitLine: { lineStyle: { color: '#f0f0f0' } }
  },
  dataZoom: [
    { type: 'inside', start: 0, end: 100 }
  ],
  series: [{
    type: 'bar',
    data: vols.map(function(v, i) { return { value: v, itemStyle: { color: volColors[i] } }; }),
    barWidth: '60%'
  }]
});

// Link zoom
klineChart.group = 'smc';
volumeChart.group = 'smc';
echarts.connect('smc');

// Resize
window.addEventListener('resize', function() {
  klineChart.resize();
  volumeChart.resize();
});
