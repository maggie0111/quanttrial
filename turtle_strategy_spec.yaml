# ============================================================
# Turtle Trading Strategy Specification (海龟交易法则策略规范)
# Version: 1.0
# Created: 2026-07-11
# Description: 标准化海龟交易法则策略的完整流程，涵盖数据加载、高低价格通道
#              (唐奇安通道)、ATR 计算、信号生成、可视化、回测评卡、
#              参数实验与策略总结，含买入持有基准对比
# Author: 郭美杰
# ============================================================

# -------------------- 1. 策略概述 --------------------
strategy:
  name: "Turtle Trading Strategy (海龟交易法则)"
  type: "趋势突破 / Breakout Trend Following"
  origin: |
    海龟交易法则由 Richard Dennis 和 William Eckhardt 于 1983 年提出，
    通过一套机械化的趋势突破规则培训了一批交易员（"海龟"），
    验证了交易能力可以通过系统化规则传授的假说。
  principle: |
    核心思想：价格突破近期高点时买入（趋势启动），价格跌破近期低点时卖出（趋势结束）。
    - 唐奇安通道 (Donchian Channel) 作为突破判断基准：
      上轨 = 过去 N 日最高价 (不含当日)
      下轨 = 过去 M 日最低价 (不含当日)
    - ATR (平均真实波幅) 用于衡量市场波动率，辅助止损和仓位管理
    - 入场：收盘价突破上轨 → 买入
    - 离场：收盘价跌破下轨 → 卖出
  core_logic:
    - "突破上轨代表多方力量压倒空方，新趋势可能启动"
    - "跌破下轨代表空方力量占优，趋势可能反转或结束"
    - "ATR 动态衡量波动率，适应不同波动环境"
    - "通道周期越长，信号越少但越可靠；周期越短，信号越多但噪声大"
  applicability: |
    适用于趋势明显的行情（单边上涨或下跌），在震荡市中会频繁出现假突破
    导致反复止损。海龟法则本质是"截断亏损，让利润奔跑"的趋势跟踪策略，
    胜率通常不高（30%-50%），但盈亏比优秀（大赚小亏）。

