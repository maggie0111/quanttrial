    name: "turtle_strategy.py"
    description: "主策略脚本, 包含数据加载、通道计算、ATR计算、信号生成、回测、可视化"
    functions:
      - load_and_clean(stock_name): "加载并清洗股票数据"
      - calc_donchian(df, entry_period, exit_period): "计算唐奇安通道 (上轨/下轨/中轨)"
      - calc_atr(df, period): "计算 True Range 和 ATR"
      - gen_signals(df, use_stop_loss, atr_multiplier): "生成买卖信号 (含可选ATR止损)"
      - select_window(df, time_window, warmup_period): "按时间窗口截取回测数据 (含预热期)"
      - backtest(df, initial_capital): "执行回测, 返回净值和交易记录"
      - backtest_benchmark(df, initial_capital): "执行买入持有回测, 返回净值"
      - calc_metrics(backtest_result, benchmark_result): "计算海龟与基准的量化指标"
      - plot_dashboard(df, metrics, stock_name, params): "绘制可视化看板 (HTML+ECharts)"
      - run_experiment(stock_name, param_list, window_list): "参数+时间窗口实验"
      - plot_experiment_results(results_df): "绘制参数实验对比图"

  dashboard:
    pattern: "{short_name}_turtle_dashboard.html"
    examples:
      - "CATL_turtle_dashboard.html"
      - "SMIC_turtle_dashboard.html"

  results_csv:
