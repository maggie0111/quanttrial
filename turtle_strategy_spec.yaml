# -------------------- 4. 唐奇安通道计算 --------------------
donchian_channel:
  definition: |
    唐奇安通道 (Donchian Channel) 由三条线组成：
    - 上轨 (Upper): 过去 N 个交易日最高价的最大值 (不含当日)
    - 下轨 (Lower): 过去 M 个交易日最低价的最小值 (不含当日)
    - 中轨 (Mid): (上轨 + 下轨) / 2

    注意: 计算上轨时使用 high 序列，计算下轨时使用 low 序列
          突破判断使用 close 序列

  default_params:
    entry_period: 20      # 入场通道周期 (上轨 = 20日最高价)
    exit_period: 10       # 出场通道周期 (下轨 = 10日最低价)

  alternative_params:      # 参数实验用
    - {entry: 10, exit: 5}      # 短周期，信号频繁
    - {entry: 15, exit: 7}      # 中短周期
    - {entry: 20, exit: 10}     # 经典海龟参数 (默认)
    - {entry: 25, exit: 12}     # 中长周期
    - {entry: 30, exit: 15}     # 长周期，信号少
    - {entry: 55, exit: 20}     # 海龟长线系统参数

  calculation:
    method: |
      # 上轨: 过去 N 日最高价 (shift(1) 确保不含当日)
      upper = df['high'].rolling(window=entry_period).max().shift(1)

      # 下轨: 过去 M 日最低价 (shift(1) 确保不含当日)
      lower = df['low'].rolling(window=exit_period).min().shift(1)

      # 中轨
      mid = (upper + lower) / 2

    shift_explanation: |
      shift(1) 的作用：确保通道值只使用 t-1 及之前的数据，不含当日。
      这样当日收盘价与"过去 N 日"的通道比较，避免未来数据泄露 (look-ahead bias)。

  output_columns:
    - upper_channel: "上轨 (N日最高价)"
    - lower_channel: "下轨 (M日最低价)"
    - mid_channel: "中轨"

  notes:
    - "通道周期 N 通常取 20 (经典海龟短线系统) 或 55 (长线系统)"
    - "出场周期 M 一般取 N/2，即 10 或 20"
    - "前 max(N, M)-1 个交易日为 NaN，不产生信号"

# -------------------- 5. ATR 计算 --------------------
atr:
  definition: |
    ATR (Average True Range, 平均真实波幅) 由 J. Welles Wilder 提出，
    用于衡量市场波动率。

    True Range (TR) 的计算:
      TR(t) = max(
        high(t) - low(t),                      # 当日波幅
        abs(high(t) - close(t-1)),             # 跳空高开波幅
        abs(low(t) - close(t-1))               # 跳空低开波幅
      )

    ATR = TR 的 N 日简单移动平均 (SMA) 或 Wilder 平滑平均 (EMA)

  default_params:
    atr_period: 20         # ATR 计算周期 (与入场通道一致)

  calculation:
    method: |
      # Step 1: 计算 True Range
      prev_close = df['close'].shift(1)
      tr1 = df['high'] - df['low']
      tr2 = (df['high'] - prev_close).abs()
      tr3 = (df['low'] - prev_close).abs()
      tr = pd.concat([tr1, tr2, tr3], axis=1).max(axis=1)

      # Step 2: 计算 ATR (SMA 方式, 简单直观)
      atr = tr.rolling(window=atr_period).mean()

      # 备选: Wilder 平滑方式 (更接近原始海龟)
      # atr = tr.ewm(alpha=1/atr_period, adjust=False).mean()

    prev_close_handling: |
      第一个交易日无 close(t-1)，TR 退化为 high - low。
      可用 tr.iloc[0] = high.iloc[0] - low.iloc[0] 填充，或留 NaN。

  output_columns:
    - TR: "当日真实波幅"
    - ATR: "ATR 平均真实波幅"

  usage_in_strategy: |
    ATR 在本策略中用于:
    1. 可选: 仓位管理 — 单位头寸 = (资金 × 1%) / (ATR × 合约乘数)
       本作业股票合约乘数=1 (1股)，简化为: unit = (资金 × 0.01) / ATR
    2. 可选: 动态止损 — 止损价 = 买入价 - 2 × ATR
    3. 波动率参考 — 可视化中展示 ATR 辅助判断市场状态

    本作业默认: 满仓买入/卖出 (不做仓位管理)，ATR 用于可视化和可选止损

  notes:
    - "ATR 周期通常与入场通道周期一致 (20日)"
    - "ATR 不直接产生买卖信号，但影响仓位和止损"
    - "高 ATR 表示市场波动大，低 ATR 表示市场平静"

# -------------------- 6. 交易信号生成 --------------------
signals:
  signal_logic:
    buy_signal:
      condition: "close(t) > upper_channel(t) AND position == 0"
      action: "BUY (买入)"
      meaning: "收盘价突破过去 N 日最高价，趋势向上启动"
    sell_signal:
      condition: "close(t) < lower_channel(t) AND position == 1"
      action: "SELL (卖出)"
      meaning: "收盘价跌破过去 M 日最低价，趋势向下结束"
    hold:
      condition: "无突破发生"
      action: "HOLD (持有/空仓)"
      meaning: "维持当前仓位不变"

  breakthrough_detail: |
    突破判断严格使用"当日收盘价"与"过去 N 日通道"比较：
    - upper_channel(t) = max(high(t-N) ... high(t-1))  ← 不含当日
    - buy 当 close(t) > upper_channel(t)

    这确保信号在当日收盘后确认，不会使用未来数据。

  implementation:
    method: |
      signal = pd.Series(0, index=df.index)

      for t in range(1, len(df)):
        if pd.isna(upper_channel[t]) or pd.isna(lower_channel[t]):
          continue

        # 买入: 收盘价突破上轨且当前空仓
        if df['close'][t] > upper_channel[t] and position[t-1] == 0:
          signal[t] = 1
          position[t] = 1

        # 卖出: 收盘价跌破下轨且当前持仓
        elif df['close'][t] < lower_channel[t] and position[t-1] == 1:
          signal[t] = -1
          position[t] = 0

        # 维持
        else:
          position[t] = position[t-1]

  output_columns:
    - signal: "1=买入, -1=卖出, 0=无操作"
    - position: "当前持仓状态: 1=持仓, 0=空仓 (根据信号累积)"

  position_tracking: |
    position[0] = 0  # 初始空仓
    遍历每个交易日:
      if signal[t] == 1:  position[t] = 1  (买入并持有)
      if signal[t] == -1: position[t] = 0  (卖出空仓)
      if signal[t] == 0:  position[t] = position[t-1]  (维持)

  trading_rules:
    - "信号在当日收盘后确认，当日收盘价成交 (或次日开盘执行)"
    - "同一时间最多持有一手 (满仓/空仓二选一)"
    - "不考虑做空，仅在持仓时盈利/亏损"
    - "每次交易全额买入/卖出 (无仓位管理，简化版)"
    - "通道计算使用 shift(1)，确保不含当日数据 (无未来函数)"

  optional_stop_loss: |
    可选止损机制 (默认关闭，参数实验可开启):
    - 买入后设置止损价 = 买入价 - 2 × ATR(买入日)
    - 若后续收盘价 < 止损价 → 提前卖出
    - 止损后等待新的突破信号再入场
    - 此机制可显著降低最大回撤，但可能减少盈利交易

