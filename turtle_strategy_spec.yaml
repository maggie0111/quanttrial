# -------------------- 8. 回测引擎 --------------------
backtest:
  assumptions:
    initial_capital: 100000       # 初始资金 (元)
    position_size: "full"         # 满仓买入/卖出 (简化版, 不做ATR仓位管理)
    commission_rate: 0.0003       # 手续费费率 (万三, 双边收取)
    slippage: 0.0001              # 滑点费率 (万一, 双边)
    stamp_duty: 0                 # 印花税 (本作业不考虑)
    trade_price: "close"          # 以当日收盘价成交 (信号当日确认后执行)

  time_window:
    description: |
      回测时间窗口 — 从全量历史数据中截取的一段区间用于回测。
      不同时间窗口对应不同的市场环境（牛市/熊市/震荡），
      观察策略在不同行情阶段的表现差异。
    default_mode: "full"          # 默认使用全部数据

    options:
      - mode: "full"
        name: "全周期"
        description: "使用全部可用交易日数据"
        catl_range: "20250704 ~ 20260703 (242天)"
        smic_range: "20250701 ~ 20260701 (237天)"

      - mode: "recent_3m"
        name: "近3个月"
        description: "截取最近约63个交易日 (一个季度)"
        catl_range: "约 20260401 ~ 20260703"
        smic_range: "约 20260401 ~ 20260701"

      - mode: "recent_6m"
        name: "近6个月"
        description: "截取最近约126个交易日 (半年)"
        catl_range: "约 20260101 ~ 20260703"
        smic_range: "约 20260101 ~ 20260701"

      - mode: "recent_12m"
        name: "近12个月"
        description: "截取最近约252个交易日 (一年, 近似全周期)"
        catl_range: "约 20250704 ~ 20260703"
        smic_range: "约 20250701 ~ 20260701"

      - mode: "custom"
        name: "自定义区间"
        description: "用户指定 start_date 和 end_date (YYYYMMDD)"
        params:
          start_date: "YYYYMMDD"
          end_date: "YYYYMMDD"

    selection_method: |
      在策略脚本中通过 TIME_WINDOW 参数选择:
        TIME_WINDOW = "full"          # 全周期 (默认)
        TIME_WINDOW = "recent_3m"     # 近3个月
        TIME_WINDOW = "recent_6m"     # 近6个月
        TIME_WINDOW = "recent_12m"    # 近12个月
        TIME_WINDOW = {"mode": "custom", "start_date": "20260101", "end_date": "20260401"}

      数据截取逻辑:
        if mode == "full":
            df_bt = df  # 全部数据
        elif mode == "recent_Nm":
            cutoff = df["trade_date"].iloc[-1] 减去 N*21 个交易日
            df_bt = df[df["trade_date"] >= cutoff]
        elif mode == "custom":
            df_bt = df[(df["trade_date"] >= start_date) & (df["trade_date"] <= end_date)]

      注意: 通道计算使用截取后的数据, 截取区间起始的前 max(entry,exit)-1 天
            仍需计入数据以使通道有效 (实际截取时多取 entry_period 天作为预热期)

  cost_model: |
    交易成本 = 手续费 + 滑点, 双边收取 (买入和卖出各扣一次)

    买入实际成交价 = close[t] × (1 + slippage)
    买入扣除手续费后单价 = 买入实际成交价 × (1 + commission_rate)
    → 每股买入成本 = close[t] × (1 + 0.0001) × (1 + 0.0003)
                  = close[t] × 1.0004  (近似)

    卖出实际成交价 = close[t] × (1 - slippage)
    卖出扣除手续费后单价 = 卖出实际成交价 × (1 - commission_rate)
    → 每股卖出收入 = close[t] × (1 - 0.0001) × (1 - 0.0003)
                   = close[t] × 0.9996  (近似)

    单次完整交易(买入+卖出)成本率 ≈ 0.08% (万八)

  execution_logic: |
    capital = initial_capital
    shares = 0
    position = 0  # 0=空仓, 1=持仓
    strategy_value = []  # 每日净值序列
    trades = []  # 交易记录

    for each trading_day t:
      if signal[t] == BUY and position == 0:
        # 买入: 价格上浮滑点, 再扣手续费
        fill_price = close[t] * (1 + slippage)
        cost_per_share = fill_price * (1 + commission_rate)
        shares = capital / cost_per_share
        capital = 0
        position = 1
        trades.append({
          "date": trade_date[t],
          "action": "BUY",
          "signal_price": close[t],
          "fill_price": fill_price,
          "shares": shares,
          "cost": shares * cost_per_share,
          "atr": atr[t],
          "upper_channel": upper_channel[t]
        })

      elif signal[t] == SELL and position == 1:
        # 卖出: 价格下浮滑点, 再扣手续费
        fill_price = close[t] * (1 - slippage)
        revenue_per_share = fill_price * (1 - commission_rate)
        capital = shares * revenue_per_share
        trades.append({
          "date": trade_date[t],
          "action": "SELL",
          "signal_price": close[t],
          "fill_price": fill_price,
          "revenue": capital,
          "shares": shares,
          "lower_channel": lower_channel[t]
        })
        shares = 0
        position = 0

      # 记录当日净值 (持仓时按收盘价估值)
      daily_value = capital + shares * close[t]
      strategy_value.append(daily_value)

    final_value = strategy_value[-1]

  benchmark:
    name: "Buy and Hold (买入持有策略)"
    description: |
      作为海龟策略的对比基准。首日全仓买入，持有至末日卖出。
      同样扣除手续费和滑点，确保对比公平。
    execution_logic: |
      # 买入持有: 第一个交易日全仓买入
      fill_price_buy = close[0] * (1 + slippage)
      cost_per_share = fill_price_buy * (1 + commission_rate)
      shares = initial_capital / cost_per_share
      capital = 0
      position = 1

      benchmark_value = []
      for each trading_day t:
        daily_value = capital + shares * close[t]
        benchmark_value.append(daily_value)

      # 末日估值 (若实际卖出需扣成本, 此处按收盘价估值以便与策略一致)
      final_value = benchmark_value[-1]

      # 如需计算卖出后净收益:
      fill_price_sell = close[-1] * (1 - slippage)
      revenue_per_share = fill_price_sell * (1 - commission_rate)
      final_cash = shares * revenue_per_share
    net_value_curve: |
      买入持有策略每日净值 = shares × close[t]
      首日净值 = initial_capital × (1 - 0.0004)  (扣除买入成本)
      净值曲线与股价走势完全同步, 仅起点比初始资金低万四

  transaction_cost_note: |
    本作业交易成本设定:
    - 手续费 (佣金): 万分之三 (0.03%), 双边收取 (买入和卖出各扣一次)
    - 滑点: 万分之一 (0.01%), 双边 (买入价上浮, 卖出价下浮)
    - 印花税: 本作业不考虑 (实际A股卖出单边收千一, 此处简化)
    - 过户费: 本作业不考虑 (实际沪市双边收万分之零点一)

    成本影响说明:
    - 海龟策略属于中低频趋势策略, 交易次数通常比双均线少
    - 每次买卖成本 ≈ 0.08% (万八)
    - 买入持有仅交易一次, 成本影响极小 (万四)
    - 趋势策略的收益来自大波段, 交易成本占比较小

# -------------------- 9. 量化指标定义 --------------------
metrics:
  total_return:
    name: "总收益率"
    formula: "策略期末净值 / 初始资金 - 1"
    description: "策略在整个回测期间的累计收益率 (已扣除交易成本)"

  annual_return:
    name: "年化收益率"
    formula: "(1 + total_return) ** (252 / trading_days) - 1"
    description: "将总收益率年化, 便于与基准比较"

  benchmark_return:
    name: "基准收益率 (买入持有)"
    formula: "买入持有期末净值 / 初始资金 - 1 (已扣除交易成本)"
    description: "同期买入持有策略的收益率, 作为策略对比基准"

  benchmark_annual_return:
    name: "基准年化收益率"
    formula: "(1 + benchmark_return) ** (252 / trading_days) - 1"
    description: "买入持有策略的年化收益率"

  excess_return:
    name: "超额收益率"
    formula: "total_return - benchmark_return"
    description: "策略相对买入持有的超额收益, 正值说明策略优于买入持有"

  win_rate:
    name: "胜率"
    formula: "盈利交易次数 / 总交易次数"
    description: "每次完整买卖(买入→卖出)为一笔交易, 盈利交易占比。海龟策略胜率通常较低(30%-50%)"

  max_drawdown:
    name: "最大回撤"
    formula: "max(1 - strategy_value[t] / running_max(strategy_value[:t]))"
    description: "策略净值从历史最高点回落的最大幅度, 衡量风险"

  benchmark_max_drawdown:
    name: "基准最大回撤 (买入持有)"
    formula: "max(1 - benchmark_value[t] / running_max(benchmark_value[:t]))"
    description: "买入持有策略的最大回撤, 与策略回撤对比衡量风险控制能力"

  sharpe_ratio:
    name: "夏普比率"
    formula: "(mean(daily_return) - risk_free_daily) / std(daily_return) * sqrt(252)"
    params:
      risk_free_rate: 0.02    # 无风险利率 (年化, 2%)
      risk_free_daily: 0.02 / 252
    description: "单位风险下的超额收益, >1 为可接受, >2 为优秀"

  benchmark_sharpe_ratio:
    name: "基准夏普比率 (买入持有)"
    formula: "(mean(benchmark_daily_return) - risk_free_daily) / std(benchmark_daily_return) * sqrt(252)"
    description: "买入持有策略的夏普比率, 与策略夏普对比衡量风险调整后收益"

  profit_loss_ratio:
    name: "盈亏比"
    formula: "mean(盈利交易收益) / abs(mean(亏损交易收益))"
    description: "平均盈利金额与平均亏损金额之比。海龟策略盈亏比通常较高(2-3以上)"

  num_trades:
    name: "交易次数"
    formula: "count(完整买卖回合)"
    description: "回测期间完成的买入→卖出交易总次数"

  avg_holding_days:
    name: "平均持仓天数"
    formula: "mean(卖出日期 - 买入日期)"
    description: "每笔交易的平均持有时间。海龟策略持仓周期通常较长(数周到数月)"

  total_cost:
    name: "总交易成本"
    formula: "Σ (每次买入成本 + 每次卖出成本)"
    description: "回测期间累计付出的手续费和滑点成本总额"

  max_single_profit:
    name: "最大单笔盈利"
    formula: "max(每笔交易收益率)"
    description: "最成功的一笔交易的收益率, 体现趋势跟踪'让利润奔跑'的特点"

  max_single_loss:
    name: "最大单笔亏损"
    formula: "min(每笔交易收益率)"
    description: "最失败的一笔交易的收益率, 体现'截断亏损'的效果"

  metrics_table_format:
    columns: ["指标", "海龟策略", "买入持有(基准)", "差值"]
    rows:
      - ["总收益率", "X%", "Y%", "X-Y%"]
      - ["年化收益率", "X%", "Y%", "X-Y%"]
      - ["最大回撤", "X%", "Y%", "X-Y%"]
      - ["夏普比率", "X", "Y", "X-Y"]
      - ["胜率", "X%", "—", "—"]
      - ["盈亏比", "X", "—", "—"]
      - ["交易次数", "N", "1", "—"]
      - ["平均持仓天数", "N天", "全部", "—"]
      - ["最大单笔盈利", "X%", "—", "—"]
      - ["最大单笔亏损", "X%", "—", "—"]
      - ["总交易成本", "X元", "Y元", "X-Y元"]

# -------------------- 10. 参数实验设计 --------------------
experiments:
  experiment_1:
    name: "固定股票, 变化通道周期 (CATL)"
    stock: "CATL (宁德时代)"
    params:
      - {entry: 10, exit: 5}
      - {entry: 15, exit: 7}
      - {entry: 20, exit: 10}   # 默认 (经典海龟)
      - {entry: 25, exit: 12}
      - {entry: 30, exit: 15}
      - {entry: 55, exit: 20}   # 海龟长线系统
    goal: "观察不同通道周期对收益、胜率、回撤、盈亏比的影响"

  experiment_2:
    name: "固定股票, 变化通道周期 (SMIC)"
    stock: "SMIC (中芯国际)"
    params: "同 experiment_1"
    goal: "观察同一策略在不同股票上的表现差异"

  experiment_3:
    name: "跨股票对比"
    stocks: ["CATL", "SMIC"]
    fixed_params: {entry: 20, exit: 10}
    fixed_window: "full"
    goal: "比较海龟策略在动力电池板块 vs 半导体板块的适用性"

  experiment_4:
    name: "固定股票和通道, 变化时间窗口 (CATL)"
    stock: "CATL (宁德时代)"
    fixed_params: {entry: 20, exit: 10}
    windows: ["full", "recent_3m", "recent_6m", "recent_12m"]
    goal: "观察同一策略在不同市场阶段 (牛市/熊市/震荡) 的表现差异"

  experiment_5:
    name: "固定股票和通道, 变化时间窗口 (SMIC)"
    stock: "SMIC (中芯国际)"
    fixed_params: {entry: 20, exit: 10}
    windows: ["full", "recent_3m", "recent_6m", "recent_12m"]
    goal: "观察SMIC在不同市场阶段的表现差异, 与CATL对比"

  experiment_6:
    name: "ATR 止损对比实验 (可选)"
    stock: "CATL (宁德时代)"
    fixed_params: {entry: 20, exit: 10}
    variants:
      - {stop_loss: false, name: "无止损 (默认)"}
      - {stop_loss: true, atr_multiplier: 2, name: "2×ATR 止损"}
      - {stop_loss: true, atr_multiplier: 3, name: "3×ATR 止损"}
    goal: "观察 ATR 动态止损对最大回撤和收益率的影响"

  output_format:
    type: "对比表格 + 柱状图"
    columns: ["股票", "入场周期", "出场周期", "时间窗口", "交易日数",
              "总收益率", "年化收益率",
              "基准收益率", "超额收益", "最大回撤", "基准最大回撤",
              "夏普比率", "基准夏普比率", "胜率", "盈亏比",
              "交易次数", "平均持仓天数", "总交易成本"]
    file: "turtle_experiment_results.csv"

# -------------------- 11. 策略总结要求 --------------------
summary:
  required_sections:
    - title: "海龟法则适用场景"
      points:
        - "趋势行情 (牛市/熊市) 中表现优异, 能捕捉大波段利润"
        - "震荡行情中频繁假突破, 收益可能为负"
        - "长周期通道 (如55/20) 信号少但更可靠, 适合中长线投资者"
        - "短周期通道 (如10/5) 信号多但噪声大, 适合短线交易者"
        - "本质是'截断亏损, 让利润奔跑', 胜率低但盈亏比高"

    - title: "不同股票的表现差异分析"
      points:
        - "宁德时代 (动力电池): 波动特征, 趋势性, 突破有效性, 策略表现"
        - "中芯国际 (半导体): 波动特征, 趋势性, 突破有效性, 策略表现"
        - "行业属性对突破策略效果的影响 (科技股波动大 vs 制造业波动小)"
        - "ATR 水平差异: 高 ATR 股票适合较长通道, 低 ATR 适合较短通道"

    - title: "参数选择心得"
      points:
        - "入场周期过短 → 假突破频繁, 交易成本侵蚀收益"
        - "入场周期过长 → 信号滞后, 错过趋势启动点"
        - "出场周期一般取入场周期的 1/2, 平衡'及时离场'和'避免噪声'"
        - "经典海龟参数 (20/10) 是经验最优, 适合大多数趋势型股票"
        - "建议: 高波动股票用长周期 (30/15), 低波动用短周期 (15/7)"
        - "ATR 止损倍数: 2×ATR 较激进 (止损快但可能误杀), 3×ATR 较保守"

    - title: "不同时间窗口的表现差异分析"
      points:
        - "牛市阶段: 趋势明确, 突破信号有效, 策略大概率跑赢或接近买入持有"
        - "熊市阶段: 突破信号帮助规避下跌, 策略可能大幅跑赢买入持有"
        - "震荡阶段: 频繁假突破, 反复止损, 策略可能跑输买入持有"
        - "时间窗口选择应覆盖不同市场环境, 避免仅在单一行情下评估"

    - title: "海龟法则 vs 买入持有对比分析"
      points:
        - "趋势明确时: 海龟策略可规避大幅回撤, 超额收益显著"
        - "单边上涨时: 买入持有可能更优 (海龟会错过部分涨幅)"
        - "震荡市中: 海龟策略可能反复止损, 不如买入持有"
        - "风险控制: 海龟策略最大回撤通常小于买入持有 (空仓期规避下跌)"
        - "交易成本: 海龟交易次数少于双均线, 成本侵蚀相对较小"

    - title: "海龟法则 vs 双均线策略对比 (跨策略)"
      points:
        - "信号机制: 海龟用价格突破通道, 双均线用均线交叉"
        - "交易频率: 海龟通常低于双均线 (通道突破比均线交叉更稀疏)"
        - "胜率: 海龟胜率通常略低于双均线, 但盈亏比更高"
        - "持仓周期: 海龟平均持仓天数通常更长"
        - "适用性: 两者都是趋势策略, 在震荡市中都会失效"

    - title: "策略局限与改进方向"
      points:
        - "单一突破信号局限性大, 容易在震荡市亏损"
        - "可加入成交量确认: 突破时成交量放大更可靠"
        - "可加入 ATR 仓位管理: 高波动时减仓, 低波动时加仓"
        - "可加入多时间框架确认: 日线突破+周线趋势一致时入场"
        - "可尝试金字塔加仓: 突破后分批建仓, 趋势延续时加仓"
        - "交易成本(手续费万三+滑点万一)对中频策略影响可控, 但需关注"
        - "与买入持有对比: 若策略无法跑赢买入持有, 说明突破判断未带来正增益"

# -------------------- 12. 文件输出规范 --------------------
